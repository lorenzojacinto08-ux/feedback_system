<!-- Top Navigation Header -->
<header class="border-bottom shadow-sm" style="position: sticky; top: 0; z-index: 1030; background: #4A90E2;">
  <div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center py-3">
      <div class="d-flex align-items-center flex-grow-1 min-width-0">
        <div class="me-4 flex-shrink-0">
          <div class="d-flex align-items-center">
            <div class="rounded-circle bg-primary bg-opacity-10 p-2 me-2">
              <i class="bi bi-chat-left-text fs-5" style="color: white !important; opacity: 0.9 !important;"></i>
            </div>
            <div class="d-none d-sm-block">
              <h5 class="mb-0 fw-bold text-white text-truncate">tugon.</h5>
              <small class="text-white fw-medium d-block" style="opacity: 0.8;">Feedback System</small>
            </div>
          </div>
        </div>
        <nav class="d-none d-lg-flex flex-nowrap overflow-hidden">
          <a href="{{ url_for('admin_dashboard') }}" class="text-decoration-none topnav-link px-3 py-2 rounded-2 text-nowrap {% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2 me-2" style="color: white !important;"></i>Dashboard
          </a>
          <div class="border-start border-2 mx-2 flex-shrink-0" style="border-color: rgba(255, 255, 255, 0.3); height: 20px; align-self: center;"></div>
          <a href="{{ url_for('stores_management') }}" class="text-decoration-none topnav-link px-3 py-2 rounded-2 text-nowrap {% if request.endpoint == 'stores_management' or 'store' in request.endpoint %}active{% endif %}">
            <i class="bi bi-shop me-2" style="color: white !important;"></i>Stores
          </a>
          <div class="border-start border-2 mx-2 flex-shrink-0" style="border-color: rgba(255, 255, 255, 0.3); height: 20px; align-self: center;"></div>
          <a href="{{ url_for('master_questionnaire') }}" class="text-decoration-none topnav-link px-3 py-2 rounded-2 text-nowrap {% if request.endpoint == 'master_questionnaire' %}active{% endif %}">
            <i class="bi bi-question-square me-2" style="color: white !important;"></i>Survey
          </a>
          <div class="border-start border-2 mx-2 flex-shrink-0" style="border-color: rgba(255, 255, 255, 0.3); height: 20px; align-self: center;"></div>
          <a href="{{ url_for('history') }}" class="text-decoration-none topnav-link px-3 py-2 rounded-2 text-nowrap {% if request.endpoint == 'history' %}active{% endif %}">
            <i class="bi bi-clock-history me-2" style="color: white !important;"></i>History
          </a>
          {% if session.get('role') != 'user' %}
          <div class="border-start border-2 mx-2 flex-shrink-0" style="border-color: rgba(255, 255, 255, 0.3); height: 20px; align-self: center;"></div>
          <a href="{{ url_for('admin_users') }}" class="text-decoration-none topnav-link px-3 py-2 rounded-2 text-nowrap {% if request.endpoint == 'admin_users' %}active{% endif %}">
            <i class="bi bi-people me-2" style="color: white !important;"></i>Users
          </a>
          {% endif %}
          <div class="border-start border-2 mx-2 flex-shrink-0" style="border-color: rgba(255, 255, 255, 0.3); height: 20px; align-self: center;"></div>
          {% if session.get('role') == 'user' %}
          <a href="{{ url_for('client_license_config') }}" class="text-decoration-none topnav-link px-3 py-2 rounded-2 text-nowrap {% if request.endpoint == 'client_license_config' %}active{% endif %}">
            <i class="bi bi-key me-2" style="color: white !important;"></i>License
          </a>
          {% else %}
          <a href="{{ url_for('admin_license_config') }}" class="text-decoration-none topnav-link px-3 py-2 rounded-2 text-nowrap {% if request.endpoint == 'admin_license_config' %}active{% endif %}">
            <i class="bi bi-key me-2" style="color: white !important;"></i>License
          </a>
          {% endif %}
        </nav>
      </div>
      <div class="d-flex align-items-center flex-shrink-0 ms-3">
        <!-- Notification Bell -->
        <div class="dropdown me-3">
          <button class="btn btn-link text-white p-0 position-relative border-0" type="button" id="notificationDropdown" data-bs-toggle="dropdown" aria-expanded="false" style="box-shadow: none;">
            <i class="bi bi-bell fs-4"></i>
            <span id="notification-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.6rem; padding: 0.25em 0.5em; border: 2px solid white;">
              0
            </span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-3 p-0 overflow-hidden" aria-labelledby="notificationDropdown" style="width: 320px; border-radius: 12px; transform: translateX(10px);">
            <li class="px-3 py-3 bg-white border-bottom d-flex justify-content-between align-items-center">
              <h6 class="fw-bold mb-0 text-dark" style="font-size: 0.9rem;">Notifications</h6>
              <span id="unread-count-text" class="badge bg-primary bg-opacity-10 text-primary rounded-pill fw-bold" style="font-size: 0.75rem;">0 New</span>
            </li>
            <div id="notification-list" style="max-height: 400px; overflow-y: auto;">
              <!-- Notifications will be loaded here -->
              <li class="px-3 py-5 text-center text-muted">
                <div class="rounded-circle bg-light d-inline-flex p-3 mb-3">
                  <i class="bi bi-bell-slash fs-4 opacity-50"></i>
                </div>
                <p class="small mb-0 fw-medium">No new feedback</p>
              </li>
            </div>
          </ul>
        </div>

        <div class="dropdown">
          <button class="btn btn-light rounded-3 px-3 py-2 d-flex align-items-center" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle text-dark me-2"></i>
            <span class="text-dark fw-bold small">
              {% if session.get('username') %}
                {{ session.get('role', '').title() }}: {{ session.get('username') }}
              {% else %}
                <a href="{{ url_for('login') }}" class="text-decoration-none text-muted">Login</a>
              {% endif %}
            </span>
          </button>
          {% if session.get('username') %}
          <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2" aria-labelledby="userDropdown">
            <li>
              <a href="{{ url_for('logout') }}" class="dropdown-item text-danger">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
              </a>
            </li>
          </ul>
          {% endif %}
        </div>
      </div>
    </div>
  </header>
