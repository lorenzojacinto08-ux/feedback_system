<!doctype html>
<!-- 
================================================================================
FILE: layout.html (Admin Base Layout)
PURPOSE: This is the main "shell" for all Admin pages. It contains the 
         sidebar, top navigation, and imports Bootstrap & CSS.
         Other admin pages "extend" this file and inject their content.
================================================================================
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Feedback Admin{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
      :root {
        /* Primary Colors - Orange Theme */
        --primary-50: #fff7ed;
        --primary-100: #ffedd5;
        --primary-200: #fed7aa;
        --primary-300: #fdba74;
        --primary-400: #fb923c;
        --primary-500: #f97316;
        --primary-600: #ea580c;
        --primary-700: #c2410c;
        --primary-800: #9a3412;
        --primary-900: #7c2d12;

        /* Neutral Colors - Black and White Theme */
        --neutral-50: #ffffff;
        --neutral-100: #f8fafc;
        --neutral-200: #f1f5f9;
        --neutral-300: #e2e8f0;
        --neutral-400: #94a3b8;
        --neutral-500: #64748b;
        --neutral-600: #475569;
        --neutral-700: #334155;
        --neutral-800: #1e293b;
        --neutral-900: #000000;
        --primary-neutral: #000000;
        --accent-neutral: #333333;
      }

      body {
        background-color: var(--neutral-50);
        color: var(--neutral-900);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        height: 100vh;
        overflow: hidden;
      }

      .sidebar {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          var(--neutral-800) 0%,
          var(--neutral-900) 100%
        );
        color: var(--neutral-200);
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
      }

      .sidebar a {
        color: var(--neutral-300);
        text-decoration: none;
        transition: all 0.2s ease;
        border-radius: 8px;
      }

      .sidebar .nav-link:hover {
        background-color: var(--neutral-700);
        color: var(--neutral-100);
        transform: translateX(2px);
      }

      .sidebar .nav-link.active {
        background: linear-gradient(
          135deg,
          var(--primary-600) 0%,
          var(--primary-700) 100%
        );
        color: white;
        font-weight: 500;
        box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
      }

      .store-card {
        transition: all 0.3s ease;
        cursor: pointer;
        border: 1px solid var(--neutral-200);
        background: white;
        border-radius: 12px;
        overflow: hidden;
      }

      .store-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        border-color: var(--neutral-300);
      }

      .card {
        border: 1px solid var(--neutral-300);
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        background: white;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--primary-600) 0%,
          var(--primary-700) 100%
        );
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }

      .btn-outline-primary {
        color: var(--primary-600);
        border-color: var(--primary-300);
        border-radius: 8px;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      .btn-outline-primary:hover {
        background: var(--primary-600);
        border-color: var(--primary-600);
        color: white;
        transform: translateY(-1px);
      }

      .form-control,
      .form-select {
        border: 1px solid var(--neutral-300);
        border-radius: 8px;
        padding: 10px 14px;
        transition: all 0.2s ease;
        background-color: white;
        color: var(--neutral-900);
      }

      .form-control:focus,
      .form-select:focus {
        border-color: var(--primary-500);
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        background-color: white;
      }

      .alert {
        border-radius: 8px;
        border: none;
      }

      .badge {
        border-radius: 6px;
        font-weight: 500;
      }
      .topnav-link {
        color: var(--neutral-700);
        text-decoration: none;
        transition: all 0.2s ease;
        border-radius: 8px;
        font-weight: 500;
        display: flex;
        align-items: center;
      }

      .topnav-link:hover {
        background-color: var(--primary-50);
        color: var(--primary-600);
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(249, 115, 22, 0.1);
      }

      .topnav-link.active {
        background: linear-gradient(
          135deg,
          var(--primary-600) 0%,
          var(--primary-700) 100%
        );
        color: white;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
      }

      /* Page title styling - smaller and more elegant */
      .page-title {
        font-size: 1.75rem;
        font-weight: 600;
        color: var(--neutral-900);
        margin-bottom: 0.5rem;
        line-height: 1.2;
      }

      .page-subtitle {
        font-size: 1rem;
        color: var(--neutral-600);
        margin-bottom: 0;
        font-weight: 400;
      }

      /* Orange transparent icons */
      .bi:not(.star-btn .bi) {
        color: var(--primary-600) !important;
        opacity: 0.7;
      }

      /* Allow star rating icons to be colored independently */
      .star-btn .bi {
        color: inherit;
        opacity: 1;
      }

      /* Header icon specific override */
      .bi-chat-left-text {
        color: var(--primary-600) !important;
        opacity: 0.7 !important;
      }

      /* Utility classes for neutral colors */
      .bg-neutral-600 { background-color: var(--neutral-600); }
      .bg-neutral-700 { background-color: var(--neutral-700); }
      .text-neutral-300 { color: var(--neutral-300); }
      .text-neutral-400 { color: var(--neutral-400); }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <!-- Include Header -->
    {% include 'header.html' %}

    <!-- Main Content Area -->
    <main class="container-fluid px-4 py-3" style="flex:1 1 0; min-height:0; overflow-y:auto;">
      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
