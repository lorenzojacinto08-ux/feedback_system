{% extends "layout.html" %}
{% set hide_header = True %}
<!-- 
================================================================================
FILE: public/thank_you.html
URL ROUTE: /s/<store_id>/thanks
PURPOSE: The "Success Page". Customers see this after submitting the survey.
         Contains the Google Review button.
================================================================================
-->

{% block title %}Thank you{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card">
        <div class="card-body p-4 p-md-5 text-center">
          <h1 class="h4 mb-2">Thank you!</h1>
          <p class="text-muted mb-4">Your feedback has been submitted successfully.</p>
          
          <div class="d-grid gap-2 mb-4">
            <a class="btn btn-primary py-3 fw-bold shadow-sm" href="https://g.page/r/CUbE41faxB6FEAE/review" target="_blank">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px;"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Rate us on Google
            </a>
          </div>

          <a class="btn btn-sm btn-link text-decoration-none text-muted" href="{{ url_for('public_survey', store_id=store.id) }}">
            Submit another response
          </a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
